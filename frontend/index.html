<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoidX - YouTube Transcript Fetcher</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #181818;
            --bg-card-hover: #1e1e1e;
            --bg-input: #141414;
            --red-primary: #e63946;
            --red-hover: #c5303c;
            --red-glow: rgba(230, 57, 70, 0.35);
            --red-subtle: rgba(230, 57, 70, 0.1);
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --text-muted: #777777;
            --border-color: #2a2a2a;
            --border-red: rgba(230, 57, 70, 0.5);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
            --shadow-red: 0 0 40px rgba(230, 57, 70, 0.25);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(230, 57, 70, 0.06) 0%, transparent 65%),
                radial-gradient(ellipse at 85% 15%, rgba(230, 57, 70, 0.04) 0%, transparent 55%);
            background-repeat: no-repeat;
        }

        /* ────────────────── Admin DP ────────────────── */
        .admin-dp-wrapper {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .admin-dp-trigger {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            cursor: pointer;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .admin-dp-trigger:hover {
            border-color: var(--red-primary);
            box-shadow: 0 0 24px var(--red-glow), 0 6px 20px rgba(0, 0, 0, 0.5);
            transform: scale(1.06);
        }

        .admin-dp-trigger:active {
            transform: scale(0.94);
            transition: all 0.1s ease;
        }

        .admin-dp-trigger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-full);
        }

        .admin-dp-trigger .dp-placeholder {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #e63946 0%, #b71c1c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            letter-spacing: 1px;
        }

        .admin-dp-dot {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 11px;
            height: 11px;
            background: #22c55e;
            border-radius: var(--radius-full);
            border: 2px solid var(--bg-primary);
            z-index: 2;
        }

        /* ── Admin Popup Card ── */
        .admin-popup {
            position: absolute;
            top: 56px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px 22px 18px;
            min-width: 240px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-12px) scale(0.94);
            transition: all var(--transition-smooth);
            pointer-events: none;
            z-index: 999;
        }

        .admin-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            border-color: var(--border-red);
            box-shadow: var(--shadow-lg), var(--shadow-red);
        }

        .admin-popup .popup-photo {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            object-fit: cover;
            border: 3px solid var(--red-primary);
            margin: 0 auto 12px;
            display: block;
            box-shadow: 0 0 28px var(--red-glow);
        }

        .admin-popup .popup-photo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, #e63946 0%, #8b1a1a 100%);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            border: 3px solid var(--red-primary);
            box-shadow: 0 0 28px var(--red-glow);
            letter-spacing: 2px;
        }

        .admin-popup .popup-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        .admin-popup .popup-socials {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .admin-popup .popup-socials a {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 15px;
            border-radius: var(--radius-full);
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            transition: all var(--transition-fast);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }

        .admin-popup .popup-socials a:hover {
            border-color: var(--red-primary);
            background: var(--red-subtle);
            box-shadow: 0 0 18px var(--red-glow);
            transform: translateY(-2px);
        }

        .admin-popup .popup-socials a svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }

        .popup-close-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            line-height: 1;
        }

        .popup-close-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        /* ── Overlay (closes popup) ── */
        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 998;
            display: none;
            background: transparent;
        }

        .popup-overlay.active {
            display: block;
        }

        /* ────────────────── Main Content ────────────────── */
        .main-container {
            width: 100%;
            max-width: 720px;
            padding: 32px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            margin-top: 8vh;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-text {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
            line-height: 1;
        }

        .logo-text span {
            color: var(--red-primary);
            position: relative;
        }

        .logo-sub {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* ── URL Input Section ── */
        .input-section {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 28px 26px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            transition: all var(--transition-smooth);
        }

        .input-section:focus-within {
            border-color: var(--border-red);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--red-subtle), 0 0 48px var(--red-glow);
        }

        .input-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 1px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            outline: none;
            transition: all var(--transition-fast);
            letter-spacing: 0.2px;
        }

        .url-input::placeholder {
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .url-input:focus {
            border-color: var(--red-primary);
            box-shadow: 0 0 0 4px var(--red-subtle);
        }

        .submit-btn {
            padding: 14px 26px;
            border-radius: var(--radius-full);
            border: none;
            background: var(--red-primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.4px;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 18px rgba(230, 57, 70, 0.35);
        }

        .submit-btn:hover {
            background: var(--red-hover);
            box-shadow: 0 6px 26px rgba(230, 57, 70, 0.5);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: scale(0.95);
            transition: all 0.08s ease;
            box-shadow: 0 2px 10px rgba(230, 57, 70, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .submit-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .submit-btn.loading .btn-text {
            visibility: hidden;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* ── Error message ── */
        .error-msg {
            color: #f87171;
            font-size: 0.82rem;
            margin-top: 10px;
            display: none;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.2px;
        }

        .error-msg.visible {
            display: flex;
        }

        .error-msg svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* ────────────────── Transcript Section ────────────────── */
        .transcript-section {
            width: 100%;
            margin-top: 28px;
            display: none;
            animation: fadeSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transcript-section.visible {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .transcript-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transcript-title .icon-tick {
            width: 20px;
            height: 20px;
            color: #22c55e;
        }

        .transcript-container {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            max-height: 480px;
            overflow-y: auto;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-smooth);
        }

        .transcript-container:hover {
            border-color: var(--border-red);
        }

        .transcript-text {
            padding: 22px 20px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            line-height: 1.75;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            letter-spacing: 0.15px;
        }

        /* Scrollbar */
        .transcript-container::-webkit-scrollbar {
            width: 6px;
        }

        .transcript-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 20px;
        }

        .transcript-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 20px;
        }

        .transcript-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ── Copy Button ── */
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        .copy-btn:hover {
            border-color: var(--red-primary);
            color: #fff;
            background: var(--red-subtle);
            box-shadow: 0 0 16px var(--red-glow);
        }

        .copy-btn.copied {
            border-color: #22c55e;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.3);
        }

        .copy-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .copy-btn .copy-icon-default {
            display: block;
        }

        .copy-btn .copy-icon-check {
            display: none;
        }

        .copy-btn.copied .copy-icon-default {
            display: none;
        }

        .copy-btn.copied .copy-icon-check {
            display: block;
        }

        /* ── Word count ── */
        .transcript-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }

        .transcript-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ────────────────── Footer / Contact Developer ────────────────── */
        .footer-section {
            width: 100%;
            max-width: 720px;
            padding: 20px 20px 32px;
            text-align: center;
            margin-top: auto;
        }

        .contact-dev-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: var(--radius-full);
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all var(--transition-fast);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .contact-dev-btn:hover {
            border-color: var(--red-primary);
            color: #fff;
            background: var(--red-subtle);
            box-shadow: 0 0 20px var(--red-glow);
            transform: translateY(-1px);
        }

        .contact-dev-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .footer-credit {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 12px;
            letter-spacing: 0.4px;
            opacity: 0.6;
        }

        /* ────────────────── Responsive ────────────────── */
        @media (max-width: 600px) {
            .main-container {
                padding: 20px 14px 30px;
                margin-top: 4vh;
            }

            .logo-text {
                font-size: 2rem;
            }

            .input-section {
                padding: 20px 16px;
                border-radius: var(--radius-md);
            }

            .input-row {
                flex-direction: column;
                gap: 10px;
            }

            .url-input {
                width: 100%;
                border-radius: var(--radius-full);
                padding: 13px 16px;
                font-size: 0.9rem;
            }

            .submit-btn {
                width: 100%;
                border-radius: var(--radius-full);
                padding: 13px;
                justify-content: center;
                display: flex;
                align-items: center;
            }

            .admin-dp-wrapper {
                top: 12px;
                right: 12px;
            }

            .admin-dp-trigger {
                width: 38px;
                height: 38px;
            }

            .admin-popup {
                right: -8px;
                min-width: 210px;
                padding: 18px 14px 14px;
                border-radius: var(--radius-md);
            }

            .transcript-container {
                max-height: 360px;
                border-radius: var(--radius-sm);
            }

            .transcript-text {
                padding: 16px 14px;
                font-size: 0.82rem;
            }

            .copy-btn {
                top: 8px;
                right: 8px;
                padding: 6px 12px;
                font-size: 0.72rem;
            }

            .copy-btn .btn-text-copy {
                display: none;
            }

            .copy-btn svg {
                width: 14px;
                height: 14px;
            }
        }

        @media (max-width: 380px) {
            .logo-text {
                font-size: 1.7rem;
            }

            .admin-popup {
                right: -20px;
                min-width: 190px;
            }
        }
    </style>
</head>

    <!-- Overlay to close popup when clicking outside -->
    <div class="popup-overlay" id="popupOverlay"></div>

    <!-- ─────────────── Main Content ─────────────── -->
    <div class="main-container">
        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-text">Geoid<span>X</span></div>
            <div class="logo-sub">YouTube Transcript Fetcher</div>

        <!-- URL Input -->

            <label class="input-label" for="youtubeUrl">Enter YouTube Video URL</label>

                <input type="url" id="youtubeUrl" class="url-input" placeholder="https://www.youtube.com/watch?v=..."
                    autocomplete="off" spellcheck="false">
                <button class="submit-btn" id="submitBtn" type="button">
                    <span class="btn-text">Fetch Transcript</span>
                    <div class="spinner"></div>
                </button>
            </div>
            <div class="error-msg" id="errorMsg">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-2h2v2h-2zm0-10v6h2V7h-2z" />
                </svg>
                <span id="errorText"></span>
            </div>
        </div>

        <!-- Transcript Result -->
        <div class="transcript-section" id="transcriptSection">
            <div class="transcript-header">
                <div class="transcript-title">
                    <svg class="icon-tick" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    Transcript
                </div>
            </div>
            <div class="transcript-container" id="transcriptContainer">
                <button class="copy-btn" id="copyBtn" title="Copy transcript">
                    <svg class="copy-icon-default" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                    </svg>
                    <svg class="copy-icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span class="btn-text-copy">Copy</span>
                </button>
                <div class="transcript-text" id="transcriptText"></div>
            </div>
            <div class="transcript-meta" id="transcriptMeta"></div>
        </div>
    </div>

    <!-- ─────────────── Footer / Contact Developer ─────────────── -->
    <div class="footer-section">
        <a class="contact-dev-btn" href="mailto:developer@geoidx.com" title="Contact Developer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="M22 4L12 13 2 4" />
            </svg>
            Contact Developer
        </a>
        <div class="footer-credit">&copy; 2026 GeoidX &mdash; Built with precision</div>
    </div>

    <script>
        (function () {
            // ─────────── CONFIG ───────────
            const API_BASE = 'https://geoidx-backend.onrender.com/'; // Change to your FastAPI server URL

            // ─────────── DOM ELEMENTS ───────────
            const youtubeUrlInput = document.getElementById('youtubeUrl');
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const transcriptSection = document.getElementById('transcriptSection');
            const transcriptContainer = document.getElementById('transcriptContainer');
            const transcriptTextEl = document.getElementById('transcriptText');
            const transcriptMeta = document.getElementById('transcriptMeta');
            const copyBtn = document.getElementById('copyBtn');
            const adminDpTrigger = document.getElementById('adminDpTrigger');
            const adminPopup = document.getElementById('adminPopup');
            const popupOverlay = document.getElementById('popupOverlay');
            const popupCloseBtn = document.getElementById('popupCloseBtn');

            let currentTranscript = '';
            let copyTimeout = null;

            // ─────────── ADMIN POPUP LOGIC ───────────
            function openAdminPopup() {
                adminPopup.classList.add('active');
                popupOverlay.classList.add('active');
            }

            function closeAdminPopup() {
                adminPopup.classList.remove('active');
                popupOverlay.classList.remove('active');
            }

            function toggleAdminPopup() {
                if (adminPopup.classList.contains('active')) {
                    closeAdminPopup();
                } else {
                    openAdminPopup();
                }
            }

            adminDpTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleAdminPopup();
            });

            popupCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeAdminPopup();
            });

            popupOverlay.addEventListener('click', closeAdminPopup);

            // Close popup on Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && adminPopup.classList.contains('active')) {
                    closeAdminPopup();
                }
            });

            // ─────────── VALIDATION ───────────
            function isValidYouTubeUrl(url) {
                if (!url || typeof url !== 'string') return false;
                const trimmed = url.trim();
                if (!trimmed) return false;
                // Match common YouTube URL patterns
                const pattern =
                    /^(https?:\/\/)?(www\.)?(youtube\.com\/(watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)[\w\-]{11}([?&][^\s]*)?$/i;
                return pattern.test(trimmed);
            }

            function showError(message) {
                errorText.textContent = message;
                errorMsg.classList.add('visible');
            }

            function hideError() {
                errorMsg.classList.remove('visible');
                errorText.textContent = '';
            }

            // ─────────── FETCH TRANSCRIPT ───────────
            async function fetchTranscript(url) {
                const trimmedUrl = url.trim();
                const response = await fetch(`${API_BASE}/gettranscript`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ URL: trimmedUrl }),
                });

                if (!response.ok) {
                    let detail = 'Failed to retrieve transcript.';
                    try {
                        const errData = await response.json();
                        if (errData && errData.detail) {
                            detail = errData.detail;
                        }
                    } catch (_) {
                        // ignore parse error
                    }
                    throw new Error(detail);
                }

                const data = await response.json();
                return data;
            }

            function extractTranscriptText(data) {
                // Handle various response shapes from Supadata
                if (typeof data === 'string') return data;
                if (data && typeof data === 'object') {
                    if (data.content && typeof data.content === 'string') return data.content;
                    if (data.text && typeof data.text === 'string') return data.text;
                    if (data.transcript && typeof data.transcript === 'string') return data.transcript;
                    if (data.data && typeof data.data === 'string') return data.data;
                    // If there's a 'parts' array or similar
                    if (Array.isArray(data.content)) {
                        return data.content.map(p => p.text || p.content || '').join(' ');
                    }
                    if (Array.isArray(data.parts)) {
                        return data.parts.map(p => p.text || p.content || '').join(' ');
                    }
                    // Last resort: stringify
                    return JSON.stringify(data, null, 2);
                }
                return String(data || '');
            }

            function displayTranscript(rawData) {
                const text = extractTranscriptText(rawData);
                currentTranscript = text;
                transcriptTextEl.textContent = text;
                transcriptSection.classList.add('visible');

                // Word & character count
                const charCount = text.length;
                const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
                transcriptMeta.innerHTML = `
                            <span>📝 ${wordCount.toLocaleString()} words</span>
                            <span>🔤 ${charCount.toLocaleString()} characters</span>
                        `;

                // Scroll transcript container to top
                transcriptContainer.scrollTop = 0;

                // Reset copy button state
                resetCopyButton();

                // Smooth scroll to transcript
                transcriptSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function hideTranscript() {
                transcriptSection.classList.remove('visible');
                currentTranscript = '';
                transcriptTextEl.textContent = '';
                transcriptMeta.innerHTML = '';
                resetCopyButton();
            }

            // ─────────── COPY BUTTON ───────────
            function resetCopyButton() {
                copyBtn.classList.remove('copied');
                if (copyTimeout) clearTimeout(copyTimeout);
                copyTimeout = null;
            }

            async function handleCopy() {
                if (!currentTranscript || !currentTranscript.trim()) return;
                try {
                    await navigator.clipboard.writeText(currentTranscript);
                    copyBtn.classList.add('copied');
                    if (copyTimeout) clearTimeout(copyTimeout);
                    copyTimeout = setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyTimeout = null;
                    }, 2200);
                } catch (err) {
                    // Fallback for older browsers
                    const textarea = document.createElement('textarea');
                    textarea.value = currentTranscript;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        copyBtn.classList.add('copied');
                        if (copyTimeout) clearTimeout(copyTimeout);
                        copyTimeout = setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyTimeout = null;
                        }, 2200);
                    } catch (_) {
                        // Copy failed silently
                    }
                    document.body.removeChild(textarea);
                }
            }

            copyBtn.addEventListener('click', handleCopy);

            // ─────────── SUBMIT HANDLER ───────────
            async function handleSubmit() {
                const url = youtubeUrlInput.value;

                // Validate
                if (!url || !url.trim()) {
                    showError('Please enter a YouTube URL.');
                    youtubeUrlInput.focus();
                    return;
                }
                if (!isValidYouTubeUrl(url)) {
                    showError('Please enter a valid YouTube video URL (e.g., https://www.youtube.com/watch?v=...).');
                    youtubeUrlInput.focus();
                    return;
                }

                hideError();
                hideTranscript();

                // Loading state
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
                youtubeUrlInput.disabled = true;

                try {
                    const rawData = await fetchTranscript(url);
                    displayTranscript(rawData);
                } catch (err) {
                    console.error('Transcript fetch error:', err);
                    let message = 'Something went wrong. Please try again.';
                    if (err.message) {
                        message = err.message;
                    }
                    if (err.name === 'TypeError' && err.message.includes('Failed to fetch')) {
                        message =
                            'Unable to connect to the server. Make sure the backend is running at ' + API_BASE;
                    }
                    showError(message);
                    hideTranscript();
                } finally {
                    // Reset loading state
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    youtubeUrlInput.disabled = false;
                    youtubeUrlInput.focus();
                }
            }

            submitBtn.addEventListener('click', handleSubmit);

            // Enter key triggers submit
            youtubeUrlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            // Clear error on input
            youtubeUrlInput.addEventListener('input', () => {
                if (errorMsg.classList.contains('visible')) {
                    hideError();
                }
            });

            // ─────────── INITIAL FOCUS ───────────
            // Slight delay to ensure page is ready
            setTimeout(() => {
                youtubeUrlInput.focus();
            }, 300);

            console.log('%c🚀 GeoidX %cFrontend Ready %c| %cAPI: ' + API_BASE,
                'color:#e63946;font-weight:bold;font-size:1.2rem;',
                'color:#fff;',
                'color:#888;',
                'color:#e63946;');
            console.log('%c🎯 Click the admin DP in the top-right corner!', 'color:#b0b0b0;font-style:italic;');
        })();
    </script>
</body>

</html>
